<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="book">

    <!-- COVER -->
    <div class="spread active">
        <img src="images/page1.jpg" class="single">
    </div>

    <!-- PAGE 2 & 3 -->
    <div class="spread">
        <img src="images/page2.jpg">
        <img src="images/page3.jpg">
    </div>

    <!-- PAGE 4 & 5 -->
    <div class="spread">
        <img src="images/page4.jpg">
        <img src="images/page5.jpg">
    </div>

    <!-- PAGE 6 & 7 -->
    <div class="spread">
        <img src="images/page6.jpg">
        <img src="images/page7.jpg">
    </div>

</div>

<div class="controls">
    <button onclick="prevPage()">← Prev</button>
    <button onclick="nextPage()">Next →</button>
</div>

<script src="script.js"></script>

</body>
</html>
