<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipbook Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="scene">

    <div class="book-wrapper">
      <!-- Page counter -->
      <div class="page-counter">
        <span id="pageNum">1</span> / <span id="pageTotal"></span>
      </div>

      <div class="book" id="book">

        <!-- COVER (single full page) -->
        <div class="spread active" data-index="0">
          <div class="page-single">
            <img src="images/page1.jpg" class="full" alt="Cover">
            <div class="page-shadow"></div>
          </div>
        </div>

        <!-- SPREAD 1 -->
        <div class="spread" data-index="1">
          <div class="page-left">
            <img src="images/page2.jpg" alt="Page 2">
            <span class="page-num-tag left">2</span>
          </div>
          <div class="page-divider"></div>
          <div class="page-right">
            <img src="images/page3.jpg" alt="Page 3">
            <span class="page-num-tag right">3</span>
          </div>
        </div>

        <!-- SPREAD 2 -->
        <div class="spread" data-index="2">
          <div class="page-left">
            <img src="images/page4.jpg" alt="Page 4">
            <span class="page-num-tag left">4</span>
          </div>
          <div class="page-divider"></div>
          <div class="page-right">
            <img src="images/page5.jpg" alt="Page 5">
            <span class="page-num-tag right">5</span>
          </div>
        </div>

        <!-- SPREAD 3 -->
        <div class="spread" data-index="3">
          <div class="page-left">
            <img src="images/page6.jpg" alt="Page 6">
            <span class="page-num-tag left">6</span>
          </div>
          <div class="page-divider"></div>
          <div class="page-right">
            <img src="images/page7.jpg" alt="Page 7">
            <span class="page-num-tag right">7</span>
          </div>
        </div>

      </div><!-- /.book -->
    </div><!-- /.book-wrapper -->

    <div class="controls">
      <button id="prevBtn" onclick="prevPage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Prev
      </button>
      <button id="nextBtn" onclick="nextPage()">
        Next
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

  </div><!-- /.scene -->

  <script src="js/script.js"></script>
</body>
</html>
