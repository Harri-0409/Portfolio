<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flipbook Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="book">

  <!-- COVER -->
  <div class="spread active">
    <img src="images/page 1.jpg" width: 600px, height: 900px,   ="full">
  </div>

  <!-- SPREAD 1 -->
  <div class="spread">
    <img src="images/page 2.jpg" class="left">
    <img src="images/page 3.jpg" class="right">
  </div>

  <!-- SPREAD 2 -->
  <div class="spread">
    <img src="images/page 4.jpg" class="left">
    <img src="images/page 5.jpg" class="right">
  </div>

  <!-- SPREAD 3 -->
  <div class="spread">
    <img src="images/page 6.jpg" class="left">
    <img src="images/page 7.jpg" class="right">
  </div>

</div>

<div class="controls">
  <button onclick="prevPage()">⬅ Prev</button>
  <button onclick="nextPage()">Next ➡</button>
</div>

<script src="js/script.js"></script>

</body>
</html>
