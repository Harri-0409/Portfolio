<!DOCTYPE html>
<html>
<head>
    <title>Flipbook Portfolio</title>

    <link rel="stylesheet" href="style.css">

    <!-- jQuery (required) -->

    <!-- Turn.js -->

</head>

<body>

    <div><img src="images/page1.jpg"></div>

    <div><img src="images/page3.jpg"></div>
    <div><img src="images/page4.jpg"></div>

<script src="script.js"></script>

</body>
</html>
